<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card List dengan Glass Effect</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background-image: url("projek.jpeg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        padding: 40px 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin-bottom: 40px;
        font-size: 2.5em;
      }

      ul {
        list-style: none;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        padding: 0;
      }

      li {
        position: relative;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 30px;
        transition: all 0.3s ease;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      .card:hover {
        transform: translateY(-10px);
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      }

      .card-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 15px;
        margin-bottom: 20px;
      }

      .card-title {
        color: white;
        font-size: 1.5em;
        margin-bottom: 15px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      }

      .card-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card-link {
        color: #fff;
        text-decoration: none;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        transition: all 0.3s ease;
        text-align: center;
        font-weight: 500;
      }

      .card-link:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.05);
      }

      .link-web {
        background: rgba(59, 130, 246, 0.3);
      }

      .link-web:hover {
        background: rgba(59, 130, 246, 0.5);
      }

      .link-html {
        background: rgba(16, 185, 129, 0.3);
      }

      .link-html:hover {
        background: rgba(16, 185, 129, 0.5);
      }

      .link-image {
        background: rgba(245, 158, 11, 0.3);
      }

      .link-image:hover {
        background: rgba(245, 158, 11, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>My Card Collection</h1>

      <ul>
        <!-- Card 1 - Ganti sesuai kebutuhan -->
        <li>
          <div class="card">
            <img src="kucingKece.png" alt="Card Image" class="card-image" />
            <h2 class="card-title">Card Title 1</h2>
            <div class="card-links">
              <a
                href="https://www.google.com"
                class="card-link link-web"
                target="_blank"
                >🌐 Visit Website</a
              >
              <a href="index.html" class="card-link link-html"
                >📄 Go to HTML Page</a
              >
              <a
                href="kucingKece.png"
                class="card-link link-image"
                target="_blank"
                >🖼️ View Image</a
              >
            </div>
          </div>
        </li>

        <!-- Card 2 - Ganti sesuai kebutuhan -->
        <li>
          <div class="card">
            <img
              src="Plum_Blossom_Eleven_9.png"
              alt="Card Image"
              class="card-image" />
            <h2 class="card-title">Card Title 2</h2>
            <div class="card-links">
              <a
                href="https://www.youtube.com"
                class="card-link link-web"
                target="_blank"
                >🌐 Visit Website</a
              >
              <a href="myProject.html" class="card-link link-html"
                >📄 Go to HTML Page</a
              >
              <a
                href="Plum_Blossom_Eleven_9.png"
                class="card-link link-image"
                target="_blank"
                >🖼️ View Image</a
              >
            </div>
          </div>
        </li>

        <!-- Card 3 - Ganti sesuai kebutuhan -->
        <li>
          <div class="card">
            <img src="propilAnda.jpeg" alt="Card Image" class="card-image" />
            <h2 class="card-title">Card Title 3</h2>
            <div class="card-links">
              <a
                href="https://www.github.com"
                class="card-link link-web"
                target="_blank"
                >🌐 Visit Website</a
              >
              <a href="index.html" class="card-link link-html"
                >📄 Go to HTML Page</a
              >
              <a
                href="propilAnda.jpeg"
                class="card-link link-image"
                target="_blank"
                >🖼️ View Image</a
              >
            </div>
          </div>
        </li>

        <!-- Tambah card baru di sini kalau mau -->
      </ul>
    </div>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
  background: linear-gradient(315deg, #410500, #6b0000, #9d0000, #b80f00, #fa0000);
        min-height: fit-content;
        height: 100vh;
      }

      .container {
        display: flex;
        gap: 20px;
        justify-items: right;
       margin-left: 25px;
       height: 80vh;
       align-items: flex-start;
       padding-top: 45px;
      }

      .box {
        color: transparent;
       background-color: rgb(150, 153, 153);
        transition:
          background-color 0.5s,
          color 0.3s;
        width: 55vh;
        height: 55vh;
        border-radius: 30px;
        display: grid;
      }

      .box:hover {
        color: white;
        background-color: rgb(45, 42, 42);
      }

      h2 {
        display: grid;
        align-items: center;
        justify-items: center;
      }

      .plagraf {
        display: flex;
        gap: 2px;
      }

      img {
        width: 25vh;
        object-fit: cover;
        padding: 25px;
        display: grid;
      
      }

      .isi {
        display: flex;
         width: 25vh;
         height: 30vh;
      }
    </style>
  </head>
  <body>
   <div class="container">
    <div class="box">
      <div class="isi">
         <img src="cool.jpeg" alt="pp">
    <p>*identitas<br>

      </div>
   
    </div>
   </div>

  </body>
</html>
